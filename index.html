<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>The Garden's Secret</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; background: #000; }
  </style>
</head>
<body>

  <!-- Enter AR Button -->
  <button id="arBtn">Enter AR</button>
  <style>
    #arBtn {
      position: fixed;
      bottom: 24px; right: 24px;
      padding: 14px 26px;
      background: #FFD700; color: #1a1a1a;
      border: none; border-radius: 30px;
      font-size: 17px; font-weight: bold;
      font-family: Georgia, serif;
      cursor: pointer; z-index: 9999;
      box-shadow: 0 4px 15px rgba(255,215,0,0.4);
    }
  </style>

  <a-scene
    webxr="requiredFeatures: local-floor; optionalFeatures: bounded-floor"
    background="color: transparent"
    renderer="colorManagement: true; alpha: true">

    <!-- Lighting -->
    <a-light type="ambient" intensity="2.5" color="#ffffff"></a-light>
    <a-light type="directional" position="1 5 -2" intensity="1.5"></a-light>

    <!-- ═══ MEMORY ORB (world space — spawns in front of camera) ═══ -->
    <a-sphere
      id="memoryOrb"
      position="0 1.5 -2"
      radius="0.28"
      material="color: #FFD700; emissive: #FFD700;
                emissiveIntensity: 0.9; opacity: 0.95"
      animation__pulse="property: material.emissiveIntensity;
                        from: 0.9; to: 0.3; dur: 1800;
                        dir: alternate; loop: true"
      animation__float="property: position; to: 0 1.75 -2; dur: 2200;
                        dir: alternate; loop: true; easing: easeInOutSine"
      visible="false">
    </a-sphere>

    <a-torus
      id="orbRing"
      position="0 1.5 -2"
      radius="0.38" radius-tubular="0.025"
      material="color: #FFD700; emissive: #FFD700;
                emissiveIntensity: 0.5; opacity: 0.6"
      animation__spin="property: rotation; to: 0 360 0;
                       dur: 3500; loop: true; easing: linear"
      animation__float="property: position; to: 0 1.75 -2; dur: 2200;
                        dir: alternate; loop: true; easing: easeInOutSine"
      visible="false">
    </a-torus>

    <!-- ═══ CAMERA with HEAD-LOCKED HUD ═══ -->
    <a-camera
      id="camera"
      look-controls="pointerLockEnabled: false"
      wasd-controls="enabled: false">

      <!-- HUD container — 0.85m in front of eyes -->
      <a-entity id="hud" position="0 0 -0.85">

        <!-- Counter: top left -->
        <a-entity id="counterUI" position="-0.28 0.14 0">
          <a-plane
            width="0.48" height="0.1"
            material="color: #0d1f12; opacity: 0.85; transparent: true">
          </a-plane>
          <a-text
            id="counterText"
            value="Memories: 0/5"
            align="center" color="#90EE90"
            width="0.44" position="0 0 0.005">
          </a-text>
        </a-entity>

        <!-- Timer: top right -->
        <a-entity id="timerUI" position="0.28 0.14 0">
          <a-plane
            width="0.38" height="0.1"
            material="color: #0d1f12; opacity: 0.85; transparent: true">
          </a-plane>
          <a-text
            id="timerText"
            value="15:00"
            align="center" color="#FF6B6B"
            width="0.34" position="0 0 0.005">
          </a-text>
        </a-entity>

        <!-- Station label: centre bottom -->
        <a-entity id="stationUI" position="0 -0.14 0" visible="false">
          <a-plane
            width="0.75" height="0.1"
            material="color: #0d1f12; opacity: 0.85; transparent: true">
          </a-plane>
          <a-text
            id="stationText"
            value=""
            align="center" color="#c8e6c9"
            width="0.7" position="0 0 0.005">
          </a-text>
        </a-entity>

      </a-entity><!-- end hud -->

      <!-- Story panel: centre of view, slightly further -->
      <a-entity id="storyPanel" position="0 0 -1.1" visible="false">
        <a-plane
          width="0.75" height="0.42"
          material="color: #0d1f12; opacity: 0.9; transparent: true">
        </a-plane>
        <a-text
          id="storyText"
          value=""
          align="center" color="#FFD700"
          width="0.68" wrap-count="30"
          position="0 0 0.005">
        </a-text>
      </a-entity>

      <!-- Win screen -->
      <a-entity id="winScreen" position="0 0 -1.1" visible="false">
        <a-plane
          width="0.85" height="0.55"
          material="color: #0d1f12; opacity: 0.93; transparent: true">
        </a-plane>
        <a-text
          id="winText"
          value="The Garden's Secret\nIs Restored.\n\nAll memories gathered.\nThe spirit of the\nMillennium Garden lives on."
          align="center" color="#FFD700"
          width="0.78" wrap-count="28"
          position="0 0 0.005">
        </a-text>
      </a-entity>

    </a-camera><!-- end camera -->

  </a-scene>

  <script>
    // ─── STATION DATA ─────────────────────────────────────────────
    const stations = [
      {
        name: "Station 1 - The Shelter",
        story: "Memory 1 of 5\n\nThe Millennium Garden\nopened 4 July 2000.\nA secret garden for reflection.",
        collected: false
      },
      {
        name: "Station 2 - Topiary Cone 2",
        story: "Memory 2 of 5\n\nTeresa Duffy, 1986-2000.\nShe brought joy to the lives\nof staff and students.",
        collected: false
      },
      {
        name: "Station 3 - Topiary Cone 5",
        story: "Memory 3 of 5\n\nDesigned by Quartet Design.\nLand donated by The Boots\nCompany in 2000.",
        collected: false
      },
      {
        name: "Station 4 - Armillary Sphere",
        story: "Memory 4 of 5\n\nOpened by Lord Dearing,\nChancellor of the University.\nThis place holds many stories.",
        collected: false
      },
      {
        name: "Station 5 - Clock Pool",
        story: "Memory 5 of 5\n\nAll memories gathered.\nNow walk the labyrinth.\nReveal the garden's secret.",
        collected: false
      }
    ];

    // ─── ELEMENT REFS ─────────────────────────────────────────────
    const memoryOrb   = document.getElementById('memoryOrb');
    const orbRing     = document.getElementById('orbRing');
    const storyPanel  = document.getElementById('storyPanel');
    const storyText   = document.getElementById('storyText');
    const counterText = document.getElementById('counterText');
    const timerText   = document.getElementById('timerText');
    const stationText = document.getElementById('stationText');
    const stationUI   = document.getElementById('stationUI');
    const winScreen   = document.getElementById('winScreen');

    // ─── GAME STATE ───────────────────────────────────────────────
    let currentStation = 0;
    let memoriesCount  = 0;
    let timerSeconds   = 900;
    let timerInterval  = null;
    let gameStarted    = false;
    let gameWon        = false;
    let collecting     = false;

    // ─── SPAWN ORB IN FRONT OF CAMERA ────────────────────────────
    function spawnOrbInFrontOfCamera() {
      const camera = document.getElementById('camera');
      const camObj = camera.object3D;

      // Get world position and forward direction
      const pos = new THREE.Vector3();
      const dir = new THREE.Vector3();
      camObj.getWorldPosition(pos);
      camObj.getWorldDirection(dir);

      // Place orb 2.2m in front, at eye height
      const orbPos = {
        x: pos.x + dir.x * 2.2,
        y: pos.y,
        z: pos.z + dir.z * 2.2
      };

      const posStr = `${orbPos.x.toFixed(3)} ${orbPos.y.toFixed(3)} ${orbPos.z.toFixed(3)}`;
      const floatStr = `${orbPos.x.toFixed(3)} ${(orbPos.y + 0.25).toFixed(3)} ${orbPos.z.toFixed(3)}`;

      memoryOrb.setAttribute('position', posStr);
      orbRing.setAttribute('position', posStr);

      // Update float animations to new position
      memoryOrb.setAttribute('animation__float',
        `property: position; from: ${posStr}; to: ${floatStr};
         dur: 2200; dir: alternate; loop: true; easing: easeInOutSine`);
      orbRing.setAttribute('animation__float',
        `property: position; from: ${posStr}; to: ${floatStr};
         dur: 2200; dir: alternate; loop: true; easing: easeInOutSine`);

      memoryOrb.setAttribute('visible', true);
      orbRing.setAttribute('visible', true);
    }

    // ─── START GAME ───────────────────────────────────────────────
    function startGame() {
      if (gameStarted) return;
      gameStarted = true;
      showCurrentStation();
      startTimer();
    }

    // ─── SHOW CURRENT STATION ─────────────────────────────────────
    function showCurrentStation() {
      if (currentStation >= stations.length) return;
      const s = stations[currentStation];
      stationText.setAttribute('value', '> ' + s.name);
      stationUI.setAttribute('visible', true);
      storyPanel.setAttribute('visible', false);
      spawnOrbInFrontOfCamera();
    }

    // ─── COLLECT FRAGMENT ─────────────────────────────────────────
    function collectFragment() {
      if (!gameStarted || gameWon || collecting) return;
      if (currentStation >= stations.length) { showWin(); return; }

      collecting = true;
      const s = stations[currentStation];
      if (s.collected) { collecting = false; return; }

      s.collected = true;
      memoriesCount++;

      // Hide orb
      memoryOrb.setAttribute('visible', false);
      orbRing.setAttribute('visible', false);

      // Show story
      storyText.setAttribute('value', s.story);
      storyPanel.setAttribute('visible', true);

      // Update counter
      counterText.setAttribute('value',
        'Memories: ' + memoriesCount + '/5');

      // After 5 seconds advance
      setTimeout(() => {
        storyPanel.setAttribute('visible', false);
        currentStation++;
        collecting = false;

        if (memoriesCount >= 5) {
          stationText.setAttribute('value', '>> Walk the Labyrinth!');
          stationUI.setAttribute('visible', true);
          memoryOrb.setAttribute('visible', false);
          orbRing.setAttribute('visible', false);
        } else {
          showCurrentStation();
        }
      }, 5000);
    }

    // ─── WIN ──────────────────────────────────────────────────────
    function showWin() {
      gameWon = true;
      clearInterval(timerInterval);
      memoryOrb.setAttribute('visible', false);
      orbRing.setAttribute('visible', false);
      storyPanel.setAttribute('visible', false);
      stationUI.setAttribute('visible', false);
      winScreen.setAttribute('visible', true);
    }

    // ─── TIMER ────────────────────────────────────────────────────
    function startTimer() {
      timerInterval = setInterval(() => {
        timerSeconds--;
        const m = Math.floor(timerSeconds / 60);
        const s = timerSeconds % 60;
        timerText.setAttribute('value',
          String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0'));
        if (timerSeconds <= 0) {
          clearInterval(timerInterval);
          timerText.setAttribute('value', 'TIME UP');
        }
      }, 1000);
    }

    // ─── AR BUTTON ────────────────────────────────────────────────
    document.getElementById('arBtn').addEventListener('click', async () => {
      if (!navigator.xr) {
        alert('WebXR not supported.'); return;
      }
      try {
        const session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['local-floor'],
          optionalFeatures: ['bounded-floor', 'hand-tracking']
        });
        const scene = document.querySelector('a-scene');
        await scene.renderer.xr.setSession(session);

        document.getElementById('arBtn').style.display = 'none';
        setTimeout(startGame, 1500);

        session.addEventListener('selectstart', () => {
          collectFragment();
        });
        session.addEventListener('end', () => {
          document.getElementById('arBtn').style.display = 'block';
        });
      } catch(err) {
        alert('AR error: ' + err.message);
      }
    });

    // Hide A-Frame's default VR button
    document.querySelector('a-scene').addEventListener('loaded', () => {
      const vrBtn = document.querySelector('.a-enter-vr');
      if (vrBtn) vrBtn.style.display = 'none';
    });

    // Keyboard testing
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        if (!gameStarted) startGame();
        else collectFragment();
      }
      if (e.code === 'KeyW') showWin();
    });
  </script>

</body>
</html>
